name: Check formatting of the project

on: [push, pull_request]

jobs:
  remark:
    name: Check Markdown formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
      - name: Check Markdown formatting
        run: pnpm exec prettier --check .
